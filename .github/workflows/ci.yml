name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: npm ci
        working-directory: mcp-server
      - run: npm run lint
        working-directory: mcp-server
      - run: pip install ruff && ruff check orchestrator/ audit-engines/
      - run: npm run typecheck
        working-directory: mcp-server

  test-mcp:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_compliance
          POSTGRES_USER: governance_admin
          POSTGRES_PASSWORD: secure_password_change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U governance_admin
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: mcp-server
      - run: npm test -- --coverage
        working-directory: mcp-server
        env:
          DATABASE_URL: postgresql+asyncpg://governance_admin:secure_password_change_me@localhost:5432/ai_compliance

  test-orchestrator:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_compliance
          POSTGRES_USER: governance_admin
          POSTGRES_PASSWORD: secure_password_change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U governance_admin
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5.16-community
        env:
          NEO4J_AUTH: neo4j/secure_password_change_me
        ports:
          - 7687:7687
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r orchestrator/requirements.txt
      - run: python -m pytest orchestrator/tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://governance_admin:secure_password_change_me@localhost:5432/ai_compliance
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: secure_password_change_me
          REDIS_URL: redis://localhost:6379

  test-audit-engines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r audit-engines/requirements.txt
      - run: python -m pytest audit-engines/tests/ -v

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_compliance
          POSTGRES_USER: governance_admin
          POSTGRES_PASSWORD: secure_password_change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U governance_admin
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5.16-community
        env:
          NEO4J_AUTH: neo4j/secure_password_change_me
        ports:
          - 7687:7687
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r orchestrator/requirements.txt
      - run: python -m pytest tests/integration/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://governance_admin:secure_password_change_me@localhost:5432/ai_compliance
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: secure_password_change_me
          REDIS_URL: redis://localhost:6379

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test-mcp, test-orchestrator, test-audit-engines, test-integration]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f deploy/docker-compose.yml build
