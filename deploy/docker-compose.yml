services:
  mcp-server:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.mcp-server
    ports:
      - "3000:3000"
    environment:
      - MCP_TRANSPORT=http
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - OAUTH_JWKS_URI=http://keycloak:8080/realms/ai-compliance/protocol/openid-connect/certs
      - OAUTH_ISSUER=http://keycloak:8080/realms/ai-compliance
      - OAUTH_AUDIENCE=ai-compliance-mcp
      - NODE_ENV=production
    networks:
      - compliance-net
    depends_on:
      orchestrator:
        condition: service_healthy

  orchestrator:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.orchestrator
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://governance_admin:secure_password_change_me@postgres:5432/ai_compliance
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=secure_password_change_me
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - KMS_TYPE=vault
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-devroot}
      - ENABLE_LIVE_REGULATORY_FEEDS=false
    networks:
      - compliance-net
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  audit-engines:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.audit-engines
    ports:
      - "9090:9090"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - NATS_URL=nats://nats:4222
      - KMS_TYPE=vault
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-devroot}
    networks:
      - compliance-net
    depends_on:
      orchestrator:
        condition: service_healthy
      nats:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=ai_compliance
      - POSTGRES_USER=governance_admin
      - POSTGRES_PASSWORD=secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance_admin -d ai_compliance"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.16-community
    environment:
      - NEO4J_AUTH=neo4j/secure_password_change_me
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - ../db/neo4j/schema.cypher:/docker-entrypoint-initdb.d/schema.cypher
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "secure_password_change_me", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - compliance-net

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data"]
    volumes:
      - nats_data:/data
    networks:
      - compliance-net

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN:-devroot}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    command: server -dev -dev-root-token-id=${VAULT_TOKEN:-devroot}
    volumes:
      - vault_data:/vault/data
    networks:
      - compliance-net

  status-list-server:
    image: nginx:alpine
    volumes:
      - ./status-lists:/usr/share/nginx/html/status-lists:ro
    ports:
      - "8081:80"
    networks:
      - compliance-net

networks:
  compliance-net:
    internal: true
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  nats_data:
  vault_data:
