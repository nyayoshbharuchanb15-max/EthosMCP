apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-neo4j
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.neo4j.storage }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-postgres
spec:
  serviceName: {{ include "ai-compliance-mcp.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-compliance-mcp.fullname" . }}-db
                  key: database-url
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-postgres
spec:
  selector:
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-neo4j
spec:
  serviceName: {{ include "ai-compliance-mcp.fullname" . }}-neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/component: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.16-community
          ports:
            - containerPort: 7687
          env:
            - name: NEO4J_AUTH
              value: "neo4j/{{ .Values.neo4j.password }}"
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.neo4j.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-neo4j
spec:
  selector:
    app.kubernetes.io/component: neo4j
  ports:
    - port: 7687
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ai-compliance-mcp.fullname" . }}-redis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.redis.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-redis
spec:
  selector:
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          command: ["nats-server", "--jetstream", "--store_dir=/data"]
          ports:
            - containerPort: 4222
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ai-compliance-mcp.fullname" . }}-nats
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-nats
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.nats.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-nats
spec:
  selector:
    app.kubernetes.io/component: nats
  ports:
    - port: 4222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: vault
  template:
    metadata:
      labels:
        app.kubernetes.io/component: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          args:
            - server
            - -dev
            - -dev-root-token-id={{ .Values.vault.token | default "devroot" }}
            - -dev-listen-address=0.0.0.0:8200
          ports:
            - containerPort: 8200
          volumeMounts:
            - name: data
              mountPath: /vault/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ai-compliance-mcp.fullname" . }}-vault
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-vault
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.vault.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-vault
spec:
  selector:
    app.kubernetes.io/component: vault
  ports:
    - port: 8200
