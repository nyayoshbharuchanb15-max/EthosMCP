apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-orchestrator
  labels:
    app.kubernetes.io/component: orchestrator
spec:
  replicas: {{ .Values.orchestratorReplicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/component: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: "{{ .Values.imageRegistry }}/orchestrator:{{ .Values.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-compliance-mcp.fullname" . }}-db
                  key: database-url
            - name: NEO4J_URI
              value: "bolt://{{ include "ai-compliance-mcp.fullname" . }}-neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-compliance-mcp.fullname" . }}-db
                  key: neo4j-password
            - name: REDIS_URL
              value: "redis://{{ include "ai-compliance-mcp.fullname" . }}-redis:6379"
            - name: NATS_URL
              value: "nats://{{ include "ai-compliance-mcp.fullname" . }}-nats:4222"
            - name: KMS_TYPE
              value: "vault"
            - name: VAULT_ADDR
              value: "http://{{ include "ai-compliance-mcp.fullname" . }}-vault:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-compliance-mcp.fullname" . }}-vault
                  key: token
            - name: ENABLE_LIVE_REGULATORY_FEEDS
              value: "false"
          resources:
            {{- toYaml .Values.resources.orchestrator | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-orchestrator
  labels:
    app.kubernetes.io/component: orchestrator
spec:
  selector:
    app.kubernetes.io/component: orchestrator
  ports:
    - port: 8080
      targetPort: 8080
