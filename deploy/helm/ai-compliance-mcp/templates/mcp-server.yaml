apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-mcp-server
  labels:
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.mcpServerReplicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: "{{ .Values.imageRegistry }}/mcp-server:{{ .Values.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: ORCHESTRATOR_URL
              value: "http://{{ include "ai-compliance-mcp.fullname" . }}-orchestrator:8080"
            - name: OAUTH_JWKS_URI
              value: {{ .Values.oauth.jwksUri | quote }}
            - name: OAUTH_ISSUER
              value: {{ .Values.oauth.issuer | quote }}
            - name: OAUTH_AUDIENCE
              value: {{ .Values.oauth.audience | quote }}
            - name: NODE_ENV
              value: "production"
          resources:
            {{- toYaml .Values.resources.mcpServer | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-mcp-server
  labels:
    app.kubernetes.io/component: mcp-server
spec:
  selector:
    app.kubernetes.io/component: mcp-server
  ports:
    - port: 3000
      targetPort: 3000
