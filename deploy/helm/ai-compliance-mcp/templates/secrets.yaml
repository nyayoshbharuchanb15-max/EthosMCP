apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-db
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ include "ai-compliance-mcp.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}"
  neo4j-password: {{ .Values.neo4j.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-compliance-mcp.fullname" . }}-vault
type: Opaque
stringData:
  token: {{ .Values.vault.token | default "devroot" | quote }}
