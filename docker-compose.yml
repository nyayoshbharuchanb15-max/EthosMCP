version: '3.8'

services:
  ethosmcp-server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env

  # The database service is required only for the roadmap persistence layer.
  # Start it alongside the server with: docker-compose --profile database up
  db:
    image: postgres:15-alpine
    profiles:
      - database
    environment:
      POSTGRES_DB: ethosmcp_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
